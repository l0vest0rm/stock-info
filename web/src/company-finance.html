  <!-- @include:company_nav -->
    <div id="container" class="my-2">
      <!-- @include:company_info -->
      <div class="row">
        <div class="col-2">
          <label for="seasons">报告数量</label>
          <select id="seasons" name="seasons">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="4">4</option>
            <option value="6" selected>6</option>
            <option value="9">9</option>
            <option value="12">12</option>
          </select>
        </div>
        <div class="col-2">
          <div id="compareType" class="btn-group" role="group">
            <button type="button" class="btn btn-sm btn-outline-primary active" data-id="yoy">同比</button>
            <button type="button" class="btn btn-sm btn-outline-primary" data-id="qoq">环比</button>
            <button type="button" class="btn btn-sm btn-outline-primary" data-id="yearly">年比</button>
          </div>
        </div>
        <div class="form-check form-switch col">
          <input class="form-check-input" type="checkbox" role="switch" id="displayEmpty">
          <label class="form-check-label" for="displayEmpty">显示空行</label>
        </div>
        <div class="col-2">
          <label for="yoyRatio">增长标色</label>
          <select id="yoyRatio">
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="10" selected>10%</option>
            <option value="15">15%</option>
            <option value="20">20%</option>
            <option value="25">25%</option>
            <option value="30">30%</option>
          </select>
        </div>
        <div class="col-5">
          <select class="form-select" id="codes" multiple="multiple"></select>
        </div>
      </div>
      <div id="financeChart" style="min-height: 600px; min-width: 300px;"></div>
      <div id="company-finance-vue-root"></div>
      <div class="modal fade" id="chartModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">指标图表</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="singleChart" style="min-height: 600px;">
            </div>
          </div>
        </div>
      </div>
    </div>
  <script src="js/company-finance-page.js"></script>
