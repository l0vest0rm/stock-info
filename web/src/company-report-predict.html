  <div class="row min-vh-100">
    <iframe id="iframe" class="col-8 px-0"></iframe>
    <div class="col-4 px-0">
        <!-- @include:company_info -->
        <textarea id="content" rows="10" cols="55"></textarea>
        <div class="d-grid gap-2 py-3">
          <button id="format" class="btn btn-primary" type="button">整理</button>
        </div>
        <div id="company-report-predict-vue-root"></div>
        <div class="row py-2">
          <label for="targetPrice" class="col-2 col-form-label">单位:</label>
          <div class="col-2">
            <select id="unit">
              <option value="m">百万元</option>
              <option value="y">亿元</option>
              <option value="b">十亿元</option>
              <option value="k">千元</option>
            </select>
          </div>
          <label for="targetPrice" class="col-3 col-form-label">目标价格(元):</label>
          <div class="col-3">
            <input type="text" name="subject" class="form-control form-control-sm" id="tp" value="">
          </div>
          <div class="col-2">
          </div>
        </div>
        <div class="d-grid gap-2 py-3">
          <button id="save" class="btn btn-primary" type="button">保存</button>
        </div>
        <div class="row py-2">
          <label for="targetPrice" class="col col-form-label">研报日期:</label>
          <div class="col">
            <input type="date" class="form-control" id="reportDate">
          </div>
          <div class="col-5">
          </div>
        </div>
        <div><a id="reportUrl" target="_blank">财报链接</a></div>
    </div>
